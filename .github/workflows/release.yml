name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          package_name="$(node -p "require('./package.json').name")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Verify release metadata
        run: node scripts/verify-release-version.mjs "${RELEASE_TAG}"

      - name: Run test suite
        run: npm test

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          mkdir -p dist
          npm pack --pack-destination dist
          tar -czf "dist/hkclaw-lite-chart-${version}.tgz" -C charts hkclaw-lite
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Check npm publish status
        id: npm_status
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.meta.outputs.package_name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure npm token exists
        if: steps.npm_status.outputs.published != 'true'
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$NPM_TOKEN" || {
            echo "Repository secret NPM_TOKEN is required to publish to npm." >&2
            exit 1
          }

      - name: Publish package to npm
        if: steps.npm_status.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}"
          else
            gh release create "${RELEASE_TAG}" dist/* --title "${RELEASE_TAG}" --generate-notes
          fi
