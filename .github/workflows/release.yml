name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          package_name="$(node -p "require('./package.json').name")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Verify release metadata
        run: node scripts/verify-release-version.mjs "${RELEASE_TAG}"

      - name: Run test suite
        run: npm test

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          mkdir -p dist
          npm pack --pack-destination dist
          tar -czf "dist/hkclaw-lite-chart-${version}.tgz" -C charts hkclaw-lite
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Check npm publish status
        id: npm_status
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if npm view "${{ steps.meta.outputs.package_name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "token_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm
        if: steps.npm_status.outputs.published != 'true' && steps.npm_status.outputs.token_available == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Note skipped npm publish
        if: steps.npm_status.outputs.published != 'true' && steps.npm_status.outputs.token_available != 'true'
        shell: bash
        run: |
          echo "::warning::Repository secret NPM_TOKEN is not configured; skipping npm publish and continuing with GitHub Release assets."

      - name: Prepare Homebrew formula
        id: homebrew_formula
        if: steps.npm_status.outputs.published == 'true' || steps.npm_status.outputs.token_available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          package_name="${{ steps.meta.outputs.package_name }}"
          version="${{ steps.meta.outputs.version }}"
          tarball_url="$(npm view "${package_name}@${version}" dist.tarball)"
          sha256="$(curl -fsSL "${tarball_url}" | shasum -a 256 | awk '{print $1}')"
          formula_path="dist/hkclaw-lite.rb"
          node scripts/render-homebrew-formula.mjs \
            --version "${version}" \
            --url "${tarball_url}" \
            --sha256 "${sha256}" \
            --out "${formula_path}"
          echo "formula_path=${formula_path}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${tarball_url}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        if: steps.homebrew_formula.outputs.formula_path != ''
        shell: bash
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tap_repository="${HOMEBREW_TAP_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-tap}"
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update. Target tap would be ${tap_repository}."
            exit 0
          fi

          workdir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repository}.git" "${workdir}/homebrew-tap"
          cd "${workdir}/homebrew-tap"
          mkdir -p Formula
          cp "${GITHUB_WORKSPACE}/${{ steps.homebrew_formula.outputs.formula_path }}" Formula/hkclaw-lite.rb

          if git diff --quiet -- Formula/hkclaw-lite.rb; then
            echo "Homebrew formula already points at hkclaw-lite ${{ steps.meta.outputs.version }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hkclaw-lite.rb
          git commit -m "Update hkclaw-lite to ${{ steps.meta.outputs.version }}" \
            -m "Point the tap formula at the npm release tarball built from ${GITHUB_SHA}." \
            -m "Constraint: Homebrew Node formulae should install npm tarballs with std_npm_args." \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Tested: node scripts/render-homebrew-formula.mjs; npm view dist.tarball sha256"
          git push origin HEAD:main

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}"
          else
            gh release create "${RELEASE_TAG}" dist/* --title "${RELEASE_TAG}" --generate-notes
          fi
