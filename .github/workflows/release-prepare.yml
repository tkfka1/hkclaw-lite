name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump strategy
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: "Exact semver to release when bump=custom (example: 1.2.3)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          bump="${{ inputs.bump }}"
          custom_version="${{ inputs.version }}"

          if [ "$bump" = "custom" ]; then
            if [ -z "$custom_version" ]; then
              echo "inputs.version is required when bump=custom" >&2
              exit 1
            fi
            npm version "$custom_version" --no-git-tag-version
          else
            npm version "$bump" --no-git-tag-version
          fi

          next_version="$(node -p \"require('./package.json').version\")"
          node scripts/sync-release-version.mjs "$next_version"
          node scripts/verify-release-version.mjs "v$next_version"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        run: npm test

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally." >&2
            exit 1
          fi
          if git ls-remote --tags origin "$tag" | grep -q "$tag$"; then
            echo "Tag $tag already exists on origin." >&2
            exit 1
          fi

      - name: Commit release metadata
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json charts/hkclaw-lite/Chart.yaml
          git commit -m "Prepare v${version} release metadata

          Keep the npm package, lockfile, and Helm chart on one release version so
          the publish workflows can derive tags and release assets from a single
          source of truth.

          Constraint: GitHub release tags, npm publishes, and Helm metadata must stay aligned
          Rejected: Manual version edits before every release | drift-prone and easy to forget
          Confidence: high
          Scope-risk: moderate
          Reversibility: clean
          Directive: Cut release tags from this workflow so package and chart versions never diverge
          Tested: npm test; node scripts/verify-release-version.mjs v${version}
          Not-tested: Protected-branch rules that block github-actions[bot] pushes"
          git tag -a "v${version}" -m "v${version}"

      - name: Push commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          git push origin "v${{ steps.version.outputs.version }}"
