replicaCount: 1

image:
  repository: ghcr.io/tkfka1/hkclaw-lite
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

state:
  mountPath: /data
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi

workspace:
  # Disabled by default. Channel workspace "~" resolves to HOME (/data),
  # so an extra /workspace mount is only useful when channels are configured
  # with explicit absolute paths under this mount.
  enabled: false
  mountPath: /workspace
  persistence:
    enabled: false
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi

bootstrapBackup:
  enabled: false
  existingSecret: ""
  secretKey: backup.json
  data: ""
  force: false

service:
  enabled: true
  type: ClusterIP
  port: 5687
  targetPort: 5687

command: []
# Images do not auto-start a role on install.
# Kubernetes runs only the explicit command/args below.
# Default chart mode is the web admin; override args for discord serve or other tasks.
args:
  - admin
  - --host
  - 0.0.0.0
  - --port
  - "5687"

env: {}
extraEnv: []
envFrom: []

extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
