replicaCount: 1
revisionHistoryLimit: 3

deploymentStrategy:
  # The default deployment is stateful: the admin container and optional
  # sidecar workers share ReadWriteOnce state/workspace PVCs. Recreate avoids
  # a rollout window where two Pods try to own the same runtime DB and workers.
  type: Recreate
  rollingUpdate: {}

image:
  repository: ghcr.io/tkfka1/hkclaw-lite
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  labels: {}
  annotations: {}

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ""

storageResize:
  # Disabled by default: enabling lets the web admin patch this release's PVCs.
  # Also requires a StorageClass with allowVolumeExpansion=true.
  rbac:
    enabled: false

podAnnotations: {}
podLabels: {}
enableServiceLinks: false
terminationGracePeriodSeconds: 30

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

state:
  mountPath: /home/hkclaw
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 25Gi

workspace:
  enabled: false
  mountPath: /home/hkclaw/workspace
  persistence:
    enabled: false
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 25Gi

bootstrapBackup:
  enabled: false
  existingSecret: ""
  secretKey: backup.json
  data: ""
  force: false

service:
  enabled: true
  type: ClusterIP
  port: 5687
  targetPort: 5687

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hkclaw-lite.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

adminExternalSecret:
  enabled: false
  # Admin auth is optional. If this ExternalSecret cannot create
  # HKCLAW_LITE_ADMIN_PASSWORD yet, the Pod still starts with login disabled.
  annotations: {}
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-store
  target:
    name: hkclaw-lite-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      data:
        HKCLAW_LITE_ADMIN_PASSWORD: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: path/to/hkclaw-lite
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

adminSecret:
  enabled: false
  # May be left empty to create a placeholder Secret; login stays disabled
  # until HKCLAW_LITE_ADMIN_PASSWORD is provided or set from the web admin.
  annotations: {}
  name: hkclaw-lite-env
  type: Opaque
  stringData: {}

command: []
# Images do not auto-start a role on install.
# Kubernetes runs only the explicit command/args below.
# Default chart mode is the web admin; override args for discord serve or other tasks.
args:
  - admin
  - --host
  - 0.0.0.0
  - --port
  - "5687"

# Optional long-running platform workers that share the admin Pod state/workspace
# volumes. This is the preferred GitOps shape for KakaoTalk because a single
# `kakao serve` process can fan out to all configured Kakao agents/channels
# without requiring a second Pod to mount the ReadWriteOnce state PVC.
workers:
  kakao:
    enabled: false
    name: kakao-worker
    command: []
    args:
      - kakao
      - serve
    env: {}
    extraEnv: []
    resources: {}

env: {}
extraEnv: []
envFrom: []

extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []

probes:
  enabled: true
  startup:
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 30
  readiness:
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
