replicaCount: 1

image:
  repository: ghcr.io/tkfka1/hkclaw-lite
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  labels: {}
  annotations: {}

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

state:
  mountPath: /home/hkclaw
  persistence:
    enabled: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi

workspace:
  enabled: false
  mountPath: /home/hkclaw/workspace
  persistence:
    enabled: false
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi

bootstrapBackup:
  enabled: false
  existingSecret: ""
  secretKey: backup.json
  data: ""
  force: false

service:
  enabled: true
  type: ClusterIP
  port: 5687
  targetPort: 5687

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hkclaw-lite.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

adminExternalSecret:
  enabled: false
  annotations: {}
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-store
  target:
    name: hkclaw-lite-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      data:
        HKCLAW_LITE_ADMIN_PASSWORD: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: hkyo/infra/helm/devops/hkclaw-lite
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

adminSecret:
  enabled: false
  annotations: {}
  name: hkclaw-lite-env
  type: Opaque
  stringData: {}

command: []
# Images do not auto-start a role on install.
# Kubernetes runs only the explicit command/args below.
# Default chart mode is the web admin; override args for discord serve or other tasks.
args:
  - admin
  - --host
  - 0.0.0.0
  - --port
  - "5687"

env: {}
extraEnv: []
envFrom: []

extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
