{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hkclaw-lite.serviceAccountName" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ or .Values.serviceAccount.automountServiceAccountToken .Values.storageResize.rbac.enabled }}
{{- end }}
