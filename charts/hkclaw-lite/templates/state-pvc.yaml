{{- if and .Values.state.persistence.enabled (not .Values.state.persistence.existingClaim) }}
{{- include "hkclaw-lite.requireStorageAtLeast25Gi" (list "state.persistence.size" .Values.state.persistence.size) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hkclaw-lite.statePvcName" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.state.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.state.persistence.size }}
  {{- with .Values.state.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
