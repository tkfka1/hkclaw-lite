{{- if .Values.storageResize.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hkclaw-lite.fullname" . }}-storage-resize
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    resourceNames:
      - {{ include "hkclaw-lite.stateResolvedPvcName" . | quote }}
      - {{ include "hkclaw-lite.workspaceResolvedPvcName" . | quote }}
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hkclaw-lite.fullname" . }}-storage-resize
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hkclaw-lite.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hkclaw-lite.fullname" . }}-storage-resize
{{- end }}
