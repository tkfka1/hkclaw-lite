{{- if and .Values.bootstrapBackup.enabled (not .Values.bootstrapBackup.existingSecret) }}
{{- $backupData := required "bootstrapBackup.data is required when bootstrapBackup.enabled=true and bootstrapBackup.existingSecret is empty" .Values.bootstrapBackup.data }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hkclaw-lite.bootstrapSecretName" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.bootstrapBackup.secretKey }}: |
{{ $backupData | nindent 4 }}
{{- end }}
