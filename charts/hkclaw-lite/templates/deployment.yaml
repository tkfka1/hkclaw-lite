apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hkclaw-lite.fullname" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hkclaw-lite.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hkclaw-lite.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "hkclaw-lite.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.bootstrapBackup.enabled (not .Values.workspace.enabled) .Values.extraInitContainers }}
      initContainers:
        {{- if .Values.bootstrapBackup.enabled }}
        - name: bootstrap-backup
          image: {{ include "hkclaw-lite.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              if [ -f "{{ .Values.state.mountPath }}/.hkclaw-lite/config.json" ] && [ "{{ ternary "true" "false" .Values.bootstrapBackup.force }}" != "true" ]; then
                echo "Existing hkclaw-lite state found, skipping bootstrap import."
                exit 0
              fi
              FORCE_FLAG=""
              if [ "{{ ternary "true" "false" .Values.bootstrapBackup.force }}" = "true" ]; then
                FORCE_FLAG="--force"
              fi
              node /app/bin/hkclaw-lite.js backup import "/bootstrap/{{ .Values.bootstrapBackup.secretKey }}" --root "{{ .Values.state.mountPath }}" ${FORCE_FLAG}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.state.mountPath }}
            - name: bootstrap-backup
              mountPath: /bootstrap
              readOnly: true
        {{- end }}
        {{- if not .Values.workspace.enabled }}
        - name: prepare-workspace
          image: {{ include "hkclaw-lite.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              mkdir -p "{{ .Values.workspace.mountPath }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.state.mountPath }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: hkclaw-lite
          image: {{ include "hkclaw-lite.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.state.mountPath }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: HOME
              value: {{ .Values.state.mountPath | quote }}
            - name: HKCLAW_LITE_DEFAULT_CHANNEL_WORKSPACE
              value: {{ .Values.workspace.mountPath | quote }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- else if or .Values.adminExternalSecret.enabled .Values.adminSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "hkclaw-lite.adminSecretName" . }}
          {{- end }}
          {{- if .Values.service.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- end }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.state.mountPath }}
            {{- if .Values.workspace.enabled }}
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "hkclaw-lite.statePvcName" .) .Values.state.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.workspace.enabled }}
        - name: workspace
          {{- if .Values.workspace.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "hkclaw-lite.workspacePvcName" .) .Values.workspace.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.bootstrapBackup.enabled }}
        - name: bootstrap-backup
          secret:
            secretName: {{ include "hkclaw-lite.bootstrapSecretName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
