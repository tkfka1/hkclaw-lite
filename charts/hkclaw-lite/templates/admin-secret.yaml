{{- if and .Values.adminSecret.enabled .Values.adminExternalSecret.enabled }}
{{- fail "Only one of adminSecret.enabled or adminExternalSecret.enabled can be true" }}
{{- end }}
{{- if .Values.adminSecret.enabled }}
{{- if eq (len .Values.adminSecret.stringData) 0 }}
{{- fail "adminSecret.stringData must contain at least one key when adminSecret.enabled=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hkclaw-lite.adminSecretName" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
  {{- with .Values.adminSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: {{ .Values.adminSecret.type }}
stringData:
  {{- toYaml .Values.adminSecret.stringData | nindent 2 }}
{{- end }}
