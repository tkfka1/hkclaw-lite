{{- if and .Values.adminSecret.enabled .Values.adminExternalSecret.enabled }}
{{- fail "Only one of adminSecret.enabled or adminExternalSecret.enabled can be true" }}
{{- end }}
{{- if .Values.adminExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "hkclaw-lite.adminSecretName" . }}
  labels:
    {{- include "hkclaw-lite.labels" . | nindent 4 }}
  {{- with .Values.adminExternalSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ .Values.adminExternalSecret.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.adminExternalSecret.secretStoreRef.kind }}
    name: {{ .Values.adminExternalSecret.secretStoreRef.name }}
  target:
    name: {{ include "hkclaw-lite.adminSecretName" . }}
    creationPolicy: {{ .Values.adminExternalSecret.target.creationPolicy }}
    deletionPolicy: {{ .Values.adminExternalSecret.target.deletionPolicy }}
    template:
      type: {{ .Values.adminExternalSecret.target.template.type }}
      engineVersion: {{ .Values.adminExternalSecret.target.template.engineVersion }}
      mergePolicy: {{ .Values.adminExternalSecret.target.template.mergePolicy }}
      data:
        {{- toYaml .Values.adminExternalSecret.target.template.data | nindent 8 }}
  data:
    {{- toYaml .Values.adminExternalSecret.data | nindent 4 }}
{{- end }}
